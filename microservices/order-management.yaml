apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-management
  namespace: ecommerce
  labels:
    app: order-management
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-management
      version: v1
  template:
    metadata:
      labels:
        app: order-management
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      volumes:
      - name: tmp-volume
        emptyDir: {}
      containers:
      - name: order-management
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
        - mountPath: /root
          name: tmp-volume
        image: rslim087/order-management:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: http
        env:
        - name: HOME
          value: "/tmp"
        - name: _JAVA_OPTIONS
          value: "-Duser.home=/tmp"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        livenessProbe:
          tcpSocket:
            port: 9090
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: ecommerce-config
---
apiVersion: v1
kind: Service
metadata:
  name: order-management
  namespace: ecommerce
spec:
  ports:
  - port: 9090
    name: http
  selector:
    app: order-management