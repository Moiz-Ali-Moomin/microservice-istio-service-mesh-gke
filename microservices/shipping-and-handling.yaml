apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-and-handling
  namespace: ecommerce
  labels:
    app: shipping-and-handling
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-and-handling
      version: v1
  template:
    metadata:
      labels:
        app: shipping-and-handling
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      volumes:
      - name: tmp-volume
        emptyDir: {}
      containers:
      - name: shipping-and-handling
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
        image: rslim087/shipping-and-handling:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: tcp-shipping
        env:
        - name: GOCACHE
          value: "/tmp"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: ecommerce-config

---
apiVersion: v1
kind: Service
metadata:
  name: shipping-and-handling
  namespace: ecommerce
spec:
  ports:
  - port: 8080
    name: http
  selector:
    app: shipping-and-handling